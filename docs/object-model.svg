<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="760" viewBox="0 0 1220 760">
  <defs>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .field { font: 13px Arial, sans-serif; fill: #1e293b; }
      .rel { font: 12px Arial, sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 10; }
      .line { stroke: #475569; stroke-width: 1.5; fill: none; }
      .badge { fill: #e2e8f0; stroke: #94a3b8; rx: 8; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <text class="title" x="30" y="36">Node Microservices - Object Model</text>

  <!-- Person -->
  <rect class="box" x="40" y="80" width="280" height="180"/>
  <text class="box-title" x="56" y="106">Person</text>
  <text class="field" x="56" y="130">id</text>
  <text class="field" x="56" y="150">createdDate</text>
  <text class="field" x="56" y="170">firstName</text>
  <text class="field" x="56" y="190">lastName</text>
  <text class="field" x="56" y="210">email</text>
  <text class="field" x="56" y="230">phone (optional)</text>

  <!-- User -->
  <rect class="box" x="380" y="80" width="280" height="170"/>
  <text class="box-title" x="396" y="106">User</text>
  <text class="field" x="396" y="130">id</text>
  <text class="field" x="396" y="150">createdDate</text>
  <text class="field" x="396" y="170">personId (FK)</text>
  <text class="field" x="396" y="190">username</text>
  <text class="field" x="396" y="210">role</text>
  <text class="field" x="396" y="230">active</text>

  <!-- Participant -->
  <rect class="box" x="380" y="300" width="280" height="170"/>
  <text class="box-title" x="396" y="326">Participant</text>
  <text class="field" x="396" y="350">id</text>
  <text class="field" x="396" y="370">createdDate</text>
  <text class="field" x="396" y="390">personId (FK)</text>
  <text class="field" x="396" y="410">userId (optional FK)</text>
  <text class="field" x="396" y="430">participantType</text>

  <!-- Matter -->
  <rect class="box" x="740" y="80" width="340" height="180"/>
  <text class="box-title" x="756" y="106">Matter</text>
  <text class="field" x="756" y="130">id</text>
  <text class="field" x="756" y="150">createdDate</text>
  <text class="field" x="756" y="170">name</text>
  <text class="field" x="756" y="190">description</text>
  <text class="field" x="756" y="210">client</text>
  <text class="field" x="756" y="230">status</text>

  <!-- Proceeding -->
  <rect class="box" x="740" y="320" width="420" height="230"/>
  <text class="box-title" x="756" y="346">Proceeding</text>
  <text class="field" x="756" y="370">id</text>
  <text class="field" x="756" y="390">matterId (FK)</text>
  <text class="field" x="756" y="410">createdDate</text>
  <text class="field" x="756" y="430">scheduledDate</text>
  <text class="field" x="756" y="450">proceedingType</text>
  <text class="field" x="756" y="470">client</text>
  <text class="field" x="756" y="490">participantIds[] (FK set)</text>
  <text class="field" x="756" y="510">participants[] (denormalized names)</text>
  <text class="field" x="756" y="530">location</text>

  <!-- Relationships -->
  <path class="line" d="M 320 130 L 380 130" marker-end="url(#arrow)"/>
  <rect class="badge" x="330" y="114" width="42" height="18"/>
  <text class="rel" x="336" y="127">1:0..1</text>

  <path class="line" d="M 320 210 L 380 360" marker-end="url(#arrow)"/>
  <rect class="badge" x="325" y="270" width="48" height="18"/>
  <text class="rel" x="332" y="283">1:0..*</text>

  <path class="line" d="M 660 390 L 740 390" marker-end="url(#arrow)"/>
  <rect class="badge" x="676" y="374" width="48" height="18"/>
  <text class="rel" x="683" y="387">*:0..*</text>

  <path class="line" d="M 910 260 L 910 320" marker-end="url(#arrow)"/>
  <rect class="badge" x="884" y="286" width="54" height="18"/>
  <text class="rel" x="892" y="299">1:0..*</text>

  <text class="rel" x="44" y="610">Legend: FK = foreign key reference. Proceeding links to Participants through participantIds[] and stores display names in participants[].</text>
</svg>
