<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matters & Proceedings</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; background: #f5f7fb; color: #0f172a; }
      .card { background: #fff; border: 1px solid #dbe3ef; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
      input, textarea, select, button { width: 100%; margin-top: .4rem; margin-bottom: .8rem; padding: .6rem; box-sizing: border-box; max-width: 100%; }
      button { cursor: pointer; background: #1d4ed8; color: white; border: none; border-radius: 8px; }
      table { width: 100%; border-collapse: collapse; background: #fff; }
      th, td { border: 1px solid #dbe3ef; padding: .6rem; text-align: left; vertical-align: top; }
      th { background: #eff6ff; }
      .layout { display: grid; grid-template-columns: 380px 1fr; gap: 1rem; }
      .error { color: #b91c1c; font-size: .9rem; margin-top: .25rem; }
      .success { color: #166534; font-size: .9rem; margin-top: .25rem; }
      @media (max-width: 1000px) { .layout { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <h1>Matters & Proceedings</h1>

    <div class="layout">
      <div>
        <div class="card">
          <h2>Create Matter</h2>
          <form id="matterForm">
            <label>Matter Name</label>
            <input type="text" id="matterName" required />

            <label>Description</label>
            <textarea id="matterDescription" rows="3" required></textarea>

            <label>Client</label>
            <input type="text" id="matterClient" required />

            <label>Status</label>
            <select id="matterStatus">
              <option>Open</option>
              <option>Pending</option>
              <option>Closed</option>
            </select>

            <button type="submit">Create Matter</button>
            <div id="matterMessage"></div>
          </form>
        </div>

        <div class="card">
          <h2>Create Proceeding</h2>
          <form id="proceedingForm">
            <label>Matter</label>
            <select id="matterId" required></select>

            <label>Scheduled Date</label>
            <input type="datetime-local" id="scheduledDate" required />

            <label>Proceeding Type</label>
            <select id="proceedingType" required>
              <option value="">Select type</option>
              <option>Deposition</option>
              <option>Arbitration</option>
              <option>Hearing</option>
              <option>Mediation</option>
              <option>Trial Preparation</option>
              <option>Case Management Conference</option>
            </select>

            <label>Client</label>
            <input type="text" id="client" placeholder="Client name" required />

            <label>Participants (comma separated)</label>
            <textarea id="participants" rows="3" placeholder="Jane Doe, John Smith" required></textarea>

            <label>Location</label>
            <input type="text" id="location" placeholder="Remote / address" required />

            <button type="submit">Create Proceeding</button>
            <div id="proceedingMessage"></div>
          </form>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>Current Matters</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Created</th>
                <th>Name</th>
                <th>Client</th>
                <th>Status</th>
                <th>Proceedings</th>
              </tr>
            </thead>
            <tbody id="matterRows"></tbody>
          </table>
        </div>

        <div class="card">
          <h2>Current Proceedings</h2>
          <label>Filter by Matter</label>
          <select id="filterMatterId">
            <option value="">Select a matter to view proceedings</option>
          </select>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Matter</th>
                <th>Created</th>
                <th>Scheduled</th>
                <th>Type</th>
                <th>Client</th>
                <th>Participants</th>
                <th>Location</th>
              </tr>
            </thead>
            <tbody id="proceedingRows"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const matterMessageEl = document.getElementById('matterMessage');
      const proceedingMessageEl = document.getElementById('proceedingMessage');

      let matters = [];

      function setMsg(el, text, type = 'error') {
        el.className = type === 'success' ? 'success' : 'error';
        el.textContent = text;
      }

      function clearMsg(el) {
        el.className = '';
        el.textContent = '';
      }

      async function loadMatters() {
        const resp = await fetch('/api/matters');
        const data = await resp.json();
        matters = data;

        const matterRows = document.getElementById('matterRows');
        matterRows.innerHTML = data.map((m) => `
          <tr>
            <td>${m.id}</td>
            <td>${new Date(m.createdDate).toLocaleString()}</td>
            <td>${m.name}</td>
            <td>${m.client}</td>
            <td>${m.status}</td>
            <td>${m.proceedingCount}</td>
          </tr>
        `).join('');

        const matterSelect = document.getElementById('matterId');
        matterSelect.innerHTML = data.map((m) => `<option value="${m.id}">${m.name} (${m.id})</option>`).join('');

        const filterMatterSelect = document.getElementById('filterMatterId');
        const existingFilter = filterMatterSelect.value;
        filterMatterSelect.innerHTML = '<option value="">Select a matter to view proceedings</option>' +
          data.map((m) => `<option value="${m.id}">${m.name} (${m.id})</option>`).join('');
        if (existingFilter && data.some((m) => m.id === existingFilter)) {
          filterMatterSelect.value = existingFilter;
        }
      }

      async function loadProceedings() {
        const resp = await fetch('/api/proceedings');
        const data = await resp.json();
        const proceedingRows = document.getElementById('proceedingRows');

        const selectedMatterId = document.getElementById('filterMatterId').value;
        if (!selectedMatterId) {
          proceedingRows.innerHTML = '<tr><td colspan="8">Select a matter to view related proceedings.</td></tr>';
          return;
        }

        const matterById = Object.fromEntries(matters.map((m) => [m.id, m.name]));
        const filtered = data.filter((p) => p.matterId === selectedMatterId);

        if (filtered.length === 0) {
          proceedingRows.innerHTML = '<tr><td colspan="8">No proceedings for the selected matter yet.</td></tr>';
          return;
        }

        proceedingRows.innerHTML = filtered.map((p) => `
          <tr>
            <td>${p.id}</td>
            <td>${matterById[p.matterId] || p.matterId || '-'}</td>
            <td>${new Date(p.createdDate).toLocaleString()}</td>
            <td>${new Date(p.scheduledDate).toLocaleString()}</td>
            <td>${p.proceedingType}</td>
            <td>${p.client}</td>
            <td>${(p.participants || []).join(', ')}</td>
            <td>${p.location}</td>
          </tr>
        `).join('');
      }

      document.getElementById('matterForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearMsg(matterMessageEl);

        const body = {
          name: document.getElementById('matterName').value,
          description: document.getElementById('matterDescription').value,
          client: document.getElementById('matterClient').value,
          status: document.getElementById('matterStatus').value,
        };

        const resp = await fetch('/api/matters', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        let payload = {};
        try { payload = await resp.json(); } catch {}

        if (!resp.ok) {
          setMsg(matterMessageEl, payload.error || 'Failed to create matter');
          return;
        }

        e.target.reset();
        setMsg(matterMessageEl, 'Matter created successfully.', 'success');
        await loadMatters();
        await loadProceedings();
      });

      document.getElementById('filterMatterId').addEventListener('change', async () => {
        await loadProceedings();
      });

      document.getElementById('proceedingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearMsg(proceedingMessageEl);

        const scheduledRaw = document.getElementById('scheduledDate').value;
        if (!scheduledRaw) {
          setMsg(proceedingMessageEl, 'Scheduled date is required.');
          return;
        }

        const body = {
          matterId: document.getElementById('matterId').value,
          scheduledDate: new Date(scheduledRaw).toISOString(),
          proceedingType: document.getElementById('proceedingType').value,
          client: document.getElementById('client').value,
          participants: document.getElementById('participants').value,
          location: document.getElementById('location').value,
        };

        const resp = await fetch('/api/proceedings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        let payload = {};
        try { payload = await resp.json(); } catch {}

        if (!resp.ok) {
          setMsg(proceedingMessageEl, payload.error || 'Failed to create proceeding');
          return;
        }

        e.target.reset();
        setMsg(proceedingMessageEl, 'Proceeding created successfully.', 'success');
        await loadMatters();
        await loadProceedings();
      });

      (async function init() {
        await loadMatters();
        await loadProceedings();
      })();
    </script>
  </body>
</html>
